name: CI Workflow

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  LOCAL_IMAGE: xiaomusic
  # NOTE: Some GitHub setups reject using the `secrets` context inside `if:`.
  # Mirror secrets into env, and only use env.* in conditions.
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

permissions:
  contents: write
  id-token: write

jobs:
  # 构建多架构 Docker 镜像并在所有平台上运行基本测试
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [amd64, arm64, armv7]
        include:
          - platform: amd64
            arch: amd64
          - platform: arm64
            arch: arm64
          - platform: armv7
            arch: arm/v7
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for ${{ matrix.platform }}
        uses: docker/build-push-action@v6
        with:
          platforms: linux/${{ matrix.arch }}
          context: .
          push: false
          load: true
          tags: ${{ env.LOCAL_IMAGE }}:${{ github.ref_name }}-${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Test Docker image for ${{ matrix.platform }}
        run: |
          docker run --rm ${{ env.LOCAL_IMAGE }}:${{ github.ref_name }}-${{ matrix.platform }} /app/.venv/bin/python3 /app/xiaomusic.py -h

      - name: Save ${{ matrix.platform }} image to tar
        run: |
          docker save ${{ env.LOCAL_IMAGE }}:${{ github.ref_name }}-${{ matrix.platform }} -o xiaomusic-${{ github.ref_name }}-${{ matrix.platform }}.tar

      - name: Upload Docker images as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-${{ matrix.platform }}
          path: xiaomusic-${{ github.ref_name }}-${{ matrix.platform }}.tar
          retention-days: 1

  # 推送多架构 Docker 镜像到 Docker Hub
  push-docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Docker repo
        id: docker_repo
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        run: echo "repo=${DOCKERHUB_REPOSITORY}" >> "$GITHUB_OUTPUT"
        env:
          DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY || format('{0}/xiaomusic-oauth2', secrets.DOCKERHUB_USERNAME) }}

      - name: Publish to Docker Hub (default branch tag)
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          context: .
          push: true
          tags: ${{ steps.docker_repo.outputs.repo }}:${{ github.ref_name }}
          cache-from: |
            type=gha,scope=amd64
            type=gha,scope=arm64
            type=gha,scope=armv7

      - name: Publish to Docker Hub latest and stable
        if: startsWith(github.ref, 'refs/tags/v') && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          context: .
          push: true
          tags: |
            ${{ steps.docker_repo.outputs.repo }}:${{ github.ref_name }}
            ${{ steps.docker_repo.outputs.repo }}:latest
            ${{ steps.docker_repo.outputs.repo }}:stable
          cache-from: |
            type=gha,scope=amd64
            type=gha,scope=arm64
            type=gha,scope=armv7

  # 推送镜像到 GitHub Release
  publish-release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: docker-images-*
          merge-multiple: true

      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install -y gh

      - name: Create or update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_NAME=${{ github.ref_name }}
          RELEASE_BODY=$(RELEASE_NAME="$RELEASE_NAME" python3 -c "import os,sys,re; tag=os.environ.get('RELEASE_NAME','').strip(); txt=open('CHANGELOG.md',encoding='utf-8').read(); m=re.search(r'^##\\s+'+re.escape(tag)+r'\\s*\\([^\\n]*\\)\\n(.*?)(?=^##\\s+|\\Z)', txt, flags=re.M|re.S); body=(m.group(1).strip() if m else '(No changelog entry found in CHANGELOG.md)'); sys.stdout.write(tag+'\\n\\n'+(body or '(Empty changelog section)'))")

          EXISTING_RELEASE=$(gh release view "${RELEASE_NAME}" --json id --jq .id || echo "")

          if [[ -n "${EXISTING_RELEASE}" ]]; then
            gh release edit "${RELEASE_NAME}" \
              --title "${RELEASE_NAME}" \
              --notes "${RELEASE_BODY}"
          else
            gh release create "${RELEASE_NAME}" \
              --prerelease=false \
              --title "${RELEASE_NAME}" \
              --notes "${RELEASE_BODY}"
          fi

      - name: Upload assets to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_NAME=${{ github.ref_name }}

          FILES=$(find . -type f -name "xiaomusic-*.tar")
          for FILE in ${FILES}; do
            echo "type upload ${FILE}"
            gh release upload "${RELEASE_NAME}" "${FILE}" --clobber
          done
