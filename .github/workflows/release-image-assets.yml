name: Attach Docker image tarballs to release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v1.0.0)
        required: true
        default: v1.0.0
      python_version:
        description: Python base image version override
        required: true
        default: "3.12"

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64
          - platform: linux/arm/v7
            arch: arm-v7
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export image
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          NAME="xiaomusic-oauth2"
          VERSION="${TAG#v}"
          IMAGE_LOCAL="${NAME}:${VERSION}-${{ matrix.arch }}"
          OUT_DIR="dist"
          OUT_TGZ="${OUT_DIR}/${NAME}-${TAG}-${{ matrix.arch }}.tar.gz"

          mkdir -p "$OUT_DIR"

          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --build-arg "PYTHON_VERSION=${{ inputs.python_version }}" \
            -t "$IMAGE_LOCAL" \
            --load \
            .

          docker save "$IMAGE_LOCAL" | gzip -1 > "$OUT_TGZ"
          sha256sum "$OUT_TGZ" > "${OUT_TGZ}.sha256"

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
