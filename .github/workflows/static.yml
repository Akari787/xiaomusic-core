name: Deploy docs to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "README.md"
      - "get_release.py"
      - ".github/workflows/static.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    # Only deploy from the repository default branch.
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "docs/package-lock.json"

      - name: Install docs dependencies
        working-directory: ./docs
        run: npm ci

      - name: Build VitePress
        id: vitepress_build
        working-directory: ./docs
        env:
          VITE_GITHUB_ISSUES_TOKEN: ${{ secrets.VITE_GITHUB_ISSUES_TOKEN }}
          # Override via repo variable if you use a custom domain.
          VITE_SITE_BASE: ${{ vars.VITE_SITE_BASE || (github.event.repository.name == format('{0}.github.io', github.repository_owner) && '/' || format('/{0}/', github.event.repository.name)) }}
        continue-on-error: true
        run: |
          set -o pipefail
          npm run docs:build 2>&1 | tee vitepress-build.log

      - name: Upload VitePress build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitepress-build-log
          path: docs/vitepress-build.log
          retention-days: 3

      - name: Fail if VitePress build failed
        if: steps.vitepress_build.outcome != 'success'
        run: exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate versions.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests
          python get_release.py

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/.vitepress/dist
          publish_branch: gh-pages
          force_orphan: true
