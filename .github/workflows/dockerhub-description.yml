name: Update Docker Hub Description

permissions:
  contents: read

on:
  push:
    branches: ["**"]
    paths:
      - 'README.md'
      - '.github/workflows/dockerhub-description.yml'
  workflow_dispatch:

jobs:
  update-description:
    runs-on: ubuntu-latest
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Docker Hub repository
        id: docker_repo
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail
          REPO="${DOCKERHUB_REPOSITORY:-}"
          if [[ -z "$REPO" ]]; then
            REPO="${DOCKERHUB_USERNAME}/${GITHUB_REPOSITORY##*/}"
          fi
          # Docker Hub repository names are effectively lowercase.
          REPO_LOWER=$(printf '%s' "$REPO" | tr '[:upper:]' '[:lower:]')
          echo "repo=${REPO_LOWER}" >> "$GITHUB_OUTPUT"
        env:
          DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}

      - name: Docker Hub Description
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          # Override via repo variable DOCKERHUB_REPOSITORY if needed.
          repository: ${{ steps.docker_repo.outputs.repo }}
