services:
  xiaomusic-core:
    build: .
    image: xiaomusic-core:latest
    container_name: xiaomusic-core
    restart: unless-stopped
    ports:
      - "58090:8090"
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      XIAOMUSIC_PUBLIC_PORT: 58090
      # Persist logs under conf/ (writable even with read_only rootfs)
      XIAOMUSIC_LOG_FILE: /app/conf/xiaomusic.log.txt
      # Security defaults
      XIAOMUSIC_ENABLE_EXEC_PLUGIN: "false"
      XIAOMUSIC_ENABLE_ANALYTICS: "false"
      XIAOMUSIC_LOG_REDACT: "true"
      XIAOMUSIC_PERSIST_TOKEN: "true"
      XIAOMUSIC_ENABLE_SELF_UPDATE: "false"
      # CORS (default localhost-only). Add your reverse-proxy/HA domains here if needed.
      XIAOMUSIC_CORS_ALLOW_ORIGINS: "http://localhost,http://127.0.0.1"
      # Outbound network access allowlist (empty -> deny). Required for web playlists / http_get / self-update.
      XIAOMUSIC_OUTBOUND_ALLOWLIST_DOMAINS: ""
      # Must stay single worker: TokenStore/auth.json is single-process safe only.
      UVICORN_WORKERS: "1"
      WEB_CONCURRENCY: "1"
    volumes:
      - ./conf:/app/conf
      # SECURITY: ensure token file is not world-readable after first login.
      # Run once on host after initial QR login: chmod 600 conf/auth.json
      - ./music:/app/music
      - ./xiaomusic/webui/static:/app/xiaomusic/webui/static:ro
    # Harden runtime
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 200
    # If you need plugin downloads or temp files, allow write only to /app/conf and /app/music.
